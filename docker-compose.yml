# Local Postgres for dev parity with Neon (Phase 11 production target).
#
# Usage:
#   docker compose up -d
#   export TRADER_DATABASE_URL=postgresql+psycopg://trader:trader@localhost:5432/trader
#   uv --project backend run alembic upgrade head
#   uv --project backend run trader-serve
#
# The default password here is intentionally weak: this stack listens on
# 127.0.0.1 only and is for local dev. Production uses the managed Neon
# DSN injected via Render env vars (see docs/security/secrets.md).

services:
  postgres:
    image: postgres:16-alpine
    container_name: trader-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
      POSTGRES_DB: trader
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - trader-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trader"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  trader-pg-data:
