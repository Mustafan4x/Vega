<title>Trader · Lab Notebook · Oxblood</title>

<!--
  ═════════════════════════════════════════════════════════════════════════════
  TRADER · LAB NOTEBOOK · OXBLOOD
  Self-contained, single-file refactor of the Oxblood variation.

  ARCHITECTURE
    • All design decisions live in CSS custom properties at :root.
    • All other CSS references variables. No raw hex / rem / px in component CSS.
    • Every visual block is labelled with [data-component] (PascalCase) and
      sub-elements with [data-element] (camelCase).
    • A JSON manifest at the bottom of <body> enumerates tokens, components,
      screens, and a Tailwind config sketch for downstream tools.
    • A "design language glossary" comment block translates plain-English
      phrases ("the primary color") to selectors / tokens.

  EDITING GUIDE FOR DOWNSTREAM TOOLS
    • To change a color globally, edit the matching --color-* variable.
    • To rescope a component visually, target its data-component selector.
    • Components map 1-to-1 to a future React surface — names in the
      manifest are the names of the eventual React components.
  ═════════════════════════════════════════════════════════════════════════════

  DESIGN LANGUAGE GLOSSARY (plain English → selector or token)

  COLORS
    "the primary color" / "the oxblood"           → --color-primary-500
    "the dark primary"                            → --color-primary-700
    "the soft primary glow"                       → --color-primary-soft
    "the accent color" / "the green"              → --color-accent-500
    "the success color"                           → --color-success-500
    "the danger color" / "the red alert"          → --color-danger-500
    "the info color" / "the sky blue"             → --color-info-500
    "the page background" / "the navy"            → --color-background
    "the surface" / "card background"             → --color-surface
    "the elevated surface" / "input bg"           → --color-surface-2
    "the border color"                            → --color-border
    "the body text"                               → --color-text-primary
    "the muted text"                              → --color-text-muted
    "the subtle text" / "tertiary text"           → --color-text-subtle
    "the inverse / on-primary text"               → --color-text-inverse

  TYPOGRAPHY
    "the body font" / "sans"                      → --font-sans         (Manrope)
    "the display font" / "italic serif"           → --font-display      (IBM Plex Serif italic)
    "the number font"                             → --font-number       (Newsreader serif)
    "the mono font"                               → --font-mono         (JetBrains Mono)
    "the hero number size"                        → --text-display-lg
    "the page-title number / big stat"            → --text-display-md
    "card titles" / "section heading"             → --text-heading-lg
    "secondary heading"                           → --text-heading-md
    "body large" / "nav item text"                → --text-body-lg
    "body" / "default text"                       → --text-body-md
    "small body" / "meta lines"                   → --text-body-sm
    "caption / tag / suffix"                      → --text-caption

  SPACING (4-px scale)
    "tight gap"      → --space-1 (4 px)
    "small gap"      → --space-2 (8 px)
    "card padding"   → --space-5 (20 px) on .tr-card
    "page padding"   → --space-6 (24 px)
    "section gap"    → --space-5 (20 px)

  RADII / SHADOWS / MOTION
    "default corner" / "card radius" → --radius-card     (6 px)
    "input corner"                   → --radius-md
    "pill corner"                    → --radius-pill
    "card shadow"                    → --shadow-card
    "card shadow on hover"           → --shadow-card-hover
    "fast transition"                → --duration-fast    + --ease-standard
    "default transition"             → --duration-base    + --ease-standard
    "smooth easing"                  → --ease-emphasized

  COMPONENTS (data-component selectors)
    "the layout"             → [data-component="LayoutShell"]
    "the sidebar"            → [data-component="Sidebar"]
    "a sidebar item"         → [data-component="Sidebar"] [data-element="navItem"]
    "the top bar"            → [data-component="TopBar"]
    "the breadcrumb"         → [data-component="TopBar"] [data-element="crumbs"]
    "the input form"         → [data-component="InputForm"]
    "an input label"         → [data-component="InputForm"] [data-element="label"]
    "an input field"         → [data-component="InputForm"] [data-element="field"]
    "the result panel"       → [data-component="ResultPanel"]
    "a metric card"          → [data-component="MetricCard"]
    "the call card"          → [data-component="MetricCard"][data-variant="call"]
    "the put card"           → [data-component="MetricCard"][data-variant="put"]
    "the Greeks panel"       → [data-component="GreeksPanel"]
    "a Greek tile"           → [data-component="GreeksPanel"] [data-element="tile"]
    "the heat map"           → [data-component="HeatMap"]
    "a heat map cell"        → [data-component="HeatMap"] [data-element="cell"]
    "the heat map axis"      → [data-component="HeatMap"] [data-element="axis"]
    "the P&L heat map"       → [data-component="PnlHeatMap"]
    "the model selector"     → [data-component="ModelSelector"]
    "a model column"         → [data-component="ModelSelector"] [data-element="column"]
    "the backtest chart"     → [data-component="BacktestChart"]
    "the backtest summary"   → [data-component="BacktestChart"] [data-element="summary"]
    "the history list"       → [data-component="HistoryList"]
    "a history row"          → [data-component="HistoryList"] [data-element="row"]
    "the ticker autocomplete"→ [data-component="TickerAutocomplete"]
    "tabs"                   → [data-component="Tabs"]
    "a tab"                  → [data-component="Tabs"] [data-element="tab"]

  COMPOUND PHRASES
    "card padding"           → --space-5 applied via .tr-card
    "card radius"            → --radius-card
    "metric card title"      → [data-component="MetricCard"] [data-element="title"]
    "heat map legend"        → not implemented — would be added as
                                [data-component="HeatMap"] [data-element="legend"]
    "hero gradient"          → --gradient-hero (none in this theme; flat fill)
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400;1,600&family=Newsreader:ital,wght@0,500;0,700;1,500;1,700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════════════════════════════════════════════════════
   1) DESIGN TOKENS — every value lives here.
      Change these to re-skin the whole app.
   ════════════════════════════════════════════════════════════════════════════ */
:root {
  /* ─── Color · primary (oxblood) ─────────────────────────────────────── */
  --color-primary-50:  #FBE9E9;
  --color-primary-100: #F5C8C8;
  --color-primary-200: #E89797;
  --color-primary-300: #DA6868;
  --color-primary-400: #CD4F4F;
  --color-primary-500: #C03A3A;   /* the oxblood */
  --color-primary-600: #A23030;
  --color-primary-700: #842525;
  --color-primary-800: #621A1A;
  --color-primary-900: #3F0F0F;
  --color-primary-soft: rgba(192, 58, 58, 0.14);

  /* ─── Color · accent (sea green) ────────────────────────────────────── */
  --color-accent-50:  #E5FBF3;
  --color-accent-100: #C0F4E0;
  --color-accent-200: #8BE7C5;
  --color-accent-300: #5EDDAE;
  --color-accent-400: #45D9A2;
  --color-accent-500: #34D399;
  --color-accent-600: #25B07F;
  --color-accent-700: #1B8A63;
  --color-accent-800: #126048;
  --color-accent-900: #0A3B2C;

  /* ─── Color · success / danger / info ───────────────────────────────── */
  --color-success-50:  #E5FBF3;
  --color-success-500: #34D399;
  --color-success-700: #1B8A63;
  --color-success-soft: rgba(52, 211, 153, 0.14);

  --color-danger-50:   #FBE9E9;
  --color-danger-500:  #C03A3A;
  --color-danger-700:  #842525;
  --color-danger-soft: rgba(192, 58, 58, 0.15);

  --color-info-50:     #E0F2FE;
  --color-info-500:    #7DD3FC;
  --color-info-700:    #0284C7;

  /* Greek-tile accent palette — neutral, not for general use */
  --color-greek-amber: #C7A248;
  --color-greek-violet: #A78BFA;

  /* ─── Color · neutrals (the navy palette) ──────────────────────────── */
  --color-neutral-50:  #F0EFEA;   /* document parchment */
  --color-neutral-100: #D7DAE2;
  --color-neutral-200: #A9AEC0;
  --color-neutral-300: #727891;
  --color-neutral-400: #4D5470;
  --color-neutral-500: #2A416A;   /* border */
  --color-neutral-600: #1C3052;   /* surface 2 */
  --color-neutral-700: #152540;   /* surface */
  --color-neutral-800: #0E1A2C;   /* background */
  --color-neutral-900: #061020;

  /* ─── Color · semantic surfaces ─────────────────────────────────────── */
  --color-background:    var(--color-neutral-800);
  --color-surface:       var(--color-neutral-700);
  --color-surface-2:     var(--color-neutral-600);
  --color-border:        var(--color-neutral-500);
  --color-text-primary:  var(--color-neutral-50);
  --color-text-muted:    var(--color-neutral-200);
  --color-text-subtle:   var(--color-neutral-300);
  --color-text-inverse:  #FFFFFF;

  /* The ruled-paper grid background */
  --paper-rule:          rgba(240, 239, 234, 0.04);
  --paper-rule-step:     32px;

  /* ─── Typography · families ─────────────────────────────────────────── */
  --font-sans:    'Manrope', 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-display: 'IBM Plex Serif', Georgia, serif;       /* italic serif for words */
  --font-number:  'Newsreader', 'Iowan Old Style', Georgia, serif; /* upright serif numbers */
  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* ─── Typography · scale (size + line-height bundled) ───────────────── */
  --text-display-lg: 56px / 1.05;     /* hero call/put values  */
  --text-display-md: 32px / 1.05;     /* big stats             */
  --text-heading-lg: 24px / 1.2;      /* card titles           */
  --text-heading-md: 19px / 1.25;     /* brand mark, model col */
  --text-body-lg:    17px / 1.5;      /* nav items, breadcrumb */
  --text-body-md:    15px / 1.5;      /* body, mode tabs       */
  --text-body-sm:    14px / 1.5;      /* meta, suffix          */
  --text-caption:    13px / 1.4;      /* tags, pills           */
  --text-micro:      11px / 1.3;      /* axis ticks            */

  /* ─── Typography · weights & tracking ───────────────────────────────── */
  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 600;
  --weight-bold:     700;
  --tracking-tight:  -0.01em;
  --tracking-normal: 0;
  --tracking-wide:   0.04em;
  --tracking-caps:   0.06em;

  /* ─── Spacing · 4-px scale ──────────────────────────────────────────── */
  --space-0:  0;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-7:  32px;
  --space-8:  40px;
  --space-10: 56px;
  --space-12: 72px;
  --space-16: 96px;

  /* ─── Radii ─────────────────────────────────────────────────────────── */
  --radius-sm:    3px;
  --radius-md:    6px;
  --radius-lg:    10px;
  --radius-card:  6px;
  --radius-pill:  999px;

  /* ─── Shadows ───────────────────────────────────────────────────────── */
  --shadow-sm:    0 1px 2px rgba(0,0,0,0.25);
  --shadow-md:    0 4px 12px rgba(0,0,0,0.30);
  --shadow-card:  0 1px 2px rgba(0,0,0,0.25), 0 6px 16px rgba(0,0,0,0.28);
  --shadow-card-hover: 0 1px 2px rgba(0,0,0,0.25), 0 12px 28px rgba(0,0,0,0.40);
  --shadow-focus: 0 0 0 3px var(--color-primary-soft);

  /* ─── Motion ────────────────────────────────────────────────────────── */
  --duration-fast: 100ms;
  --duration-base: 180ms;
  --duration-slow: 320ms;
  --ease-standard:  cubic-bezier(0.2, 0, 0, 1);
  --ease-emphasized: cubic-bezier(0.22, 0.8, 0.36, 1);

  /* ─── Z-stack ───────────────────────────────────────────────────────── */
  --z-popover: 20;
  --z-modal:   40;

  /* ─── Layout ────────────────────────────────────────────────────────── */
  --layout-sidebar-width: 232px;
  --layout-topbar-height: 56px;
  --layout-page-max:      1400px;
}

/* ════════════════════════════════════════════════════════════════════════════
   2) GLOBAL RESETS & DOCUMENT
   ════════════════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  font-size: var(--text-body-md);
  line-height: 1.5;
  color: var(--color-text-primary);
  background: var(--color-background);
  background-image: repeating-linear-gradient(
    0deg,
    transparent 0 calc(var(--paper-rule-step) - 1px),
    var(--paper-rule) calc(var(--paper-rule-step) - 1px) var(--paper-rule-step)
  );
  min-height: 100vh;
}
button, input, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  background: transparent;
  border: 0;
}
button { cursor: pointer; }
:focus-visible { outline: 2px solid var(--color-primary-500); outline-offset: 2px; }

/* Number/text input native chrome stripped — typing-only fields */
.tr-input[type="number"]::-webkit-outer-spin-button,
.tr-input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.tr-input[type="number"] { -moz-appearance: textfield; }

/* ════════════════════════════════════════════════════════════════════════════
   3) UTILITY CLASSES — typography roles
   ════════════════════════════════════════════════════════════════════════════ */
/* Numbers everywhere: Newsreader serif, upright, tabular figures */
.t-num-hero,
.t-num-display,
.t-num,
.t-mono,
.tr-mono,
input[type="date"].tr-input,
.tr-hm-tick,
svg text.tr-axis-text {
  font-family: var(--font-number);
  font-style: normal;
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum" 1, "lnum" 1;
  letter-spacing: -0.005em;
}
.t-num-hero    { font: var(--weight-bold) var(--text-display-lg) var(--font-number); font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
.t-num-display { font: var(--weight-semibold) var(--text-display-md) var(--font-number); font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
.t-num         { font-weight: var(--weight-medium); }

/* Structural words: IBM Plex Serif Italic */
.t-italic-serif {
  font-family: var(--font-display);
  font-style: italic;
}

/* Semantic colors */
.tr-pos { color: var(--color-success-500); }
.tr-neg { color: var(--color-danger-500); }
.tr-muted { color: var(--color-text-subtle); }

/* ════════════════════════════════════════════════════════════════════════════
   4) LAYOUT SHELL  · [data-component="LayoutShell"]
   ════════════════════════════════════════════════════════════════════════════ */
[data-component="LayoutShell"] {
  display: grid;
  grid-template-columns: var(--layout-sidebar-width) 1fr;
  min-height: 100vh;
  background: var(--color-background);
  color: var(--color-text-primary);
}

/* ─── Sidebar · [data-component="Sidebar"] ──────────────────────────── */
[data-component="Sidebar"] {
  background: rgba(14, 26, 44, 0.92);
  border-right: 1px solid var(--color-primary-soft);
  padding: var(--space-5) var(--space-3);
  display: flex;
  flex-direction: column;
  gap: var(--space-4);
}
[data-component="Sidebar"] [data-element="brand"] {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-1) var(--space-2) var(--space-3);
  border-bottom: 1px solid var(--color-border);
}
[data-component="Sidebar"] [data-element="brandMark"] {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  background: var(--color-primary-500);
  color: var(--color-text-inverse);
  border-radius: var(--radius-sm);
}
[data-component="Sidebar"] [data-element="brandName"] {
  font: var(--weight-bold) var(--text-heading-md) var(--font-display);
  font-style: italic;
  letter-spacing: var(--tracking-tight);
}
[data-component="Sidebar"] [data-element="nav"] {
  display: flex; flex-direction: column;
  gap: var(--space-1);
  flex: 1;
}
[data-component="Sidebar"] [data-element="navItem"] {
  display: flex; align-items: center;
  gap: var(--space-3);
  padding: 11px 12px;
  border-radius: var(--radius-md);
  font: var(--weight-medium) var(--text-body-lg) var(--font-display);
  font-style: italic;
  color: var(--color-text-muted);
  text-align: left;
  letter-spacing: var(--tracking-normal);
  transition: background var(--duration-base) var(--ease-standard),
              color      var(--duration-base) var(--ease-standard);
}
[data-component="Sidebar"] [data-element="navItem"]:hover {
  background: var(--color-surface-2);
  color: var(--color-text-primary);
}
[data-component="Sidebar"] [data-element="navItem"][data-active="true"] {
  background: var(--color-primary-soft);
  color: var(--color-primary-500);
  font-weight: var(--weight-bold);
}
[data-component="Sidebar"] [data-element="footer"] {
  font: var(--weight-medium) var(--text-micro) var(--font-mono);
  color: var(--color-text-subtle);
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-top: 1px solid var(--color-border);
}
[data-component="Sidebar"] [data-element="statusDot"] {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--color-success-500);
  box-shadow: 0 0 8px var(--color-success-500);
}

/* ─── TopBar · [data-component="TopBar"] ────────────────────────────── */
[data-component="TopBar"] {
  height: var(--layout-topbar-height);
  border-bottom: 1px solid var(--color-border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--space-6);
  background: rgba(14, 26, 44, 0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
[data-component="TopBar"] [data-element="crumbs"] {
  display: flex; align-items: center;
  gap: var(--space-2);
}
[data-component="TopBar"] [data-element="crumbMuted"] {
  font: italic var(--weight-medium) var(--text-body-md) var(--font-display);
  color: var(--color-text-subtle);
}
[data-component="TopBar"] [data-element="crumbSep"] {
  color: var(--color-text-subtle);
  font-family: var(--font-display);
  font-style: italic;
}
[data-component="TopBar"] [data-element="crumb"] {
  font: italic var(--weight-bold) var(--text-body-lg) var(--font-display);
  color: var(--color-text-primary);
}
[data-component="TopBar"] [data-element="actions"] {
  display: flex; align-items: center; gap: var(--space-2);
}
[data-component="TopBar"] [data-element="iconBtn"] {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  border-radius: var(--radius-md);
  color: var(--color-text-muted);
  transition: background var(--duration-base) var(--ease-standard);
}
[data-component="TopBar"] [data-element="iconBtn"]:hover {
  background: var(--color-surface-2);
  color: var(--color-text-primary);
}
[data-component="TopBar"] [data-element="avatar"] {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--color-primary-500);
  color: var(--color-text-inverse);
  display: grid; place-items: center;
  font: var(--weight-semibold) var(--text-micro) var(--font-mono);
}

/* Page content slot */
.tr-page {
  padding: var(--space-6);
  max-width: var(--layout-page-max);
  width: 100%;
  margin: 0 auto;
}
.tr-main { display: flex; flex-direction: column; min-width: 0; }

/* ════════════════════════════════════════════════════════════════════════════
   5) SHARED CARD CHROME
   ════════════════════════════════════════════════════════════════════════════ */
.tr-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  padding: var(--space-5);
  box-shadow: var(--shadow-card);
}
.tr-card-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: var(--space-4);
}
.tr-card-title {
  font: italic var(--weight-bold) var(--text-heading-lg) var(--font-display);
  margin: 0;
  letter-spacing: -0.005em;
  color: var(--color-text-primary);
}
.tr-card-meta {
  font: italic var(--weight-medium) var(--text-body-sm) var(--font-display);
  color: var(--color-text-muted);
  white-space: nowrap;
}

/* ════════════════════════════════════════════════════════════════════════════
   6) FORM PRIMITIVES — labels, inputs, selects, ticker pop, suffixes
       (used inside InputForm, BacktestChart controls, HeatMap controls)
   ════════════════════════════════════════════════════════════════════════════ */
.tr-label {
  font: italic var(--weight-bold) 16px var(--font-display);
  color: var(--color-text-primary);
  display: block;
  margin-bottom: 10px;
  letter-spacing: var(--tracking-normal);
}
.tr-input-wrap, .tr-ticker-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.tr-input {
  width: 100%;
  height: 44px;
  padding: 0 14px;
  background: rgba(0, 0, 0, 0.32);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  font-weight: var(--weight-medium);
  font-size: var(--text-body-sm);
  transition: border-color var(--duration-base) var(--ease-standard),
              box-shadow   var(--duration-base) var(--ease-standard);
  appearance: none;
  -webkit-appearance: none;
}
.tr-input:hover { border-color: rgba(192, 58, 58, 0.35); }
.tr-input:focus, .tr-input:focus-visible {
  outline: none;
  border-color: var(--color-primary-500);
  box-shadow: var(--shadow-focus);
}
.tr-input.tr-mono { font-family: var(--font-number); font-variant-numeric: tabular-nums; }

input[type="date"].tr-input {
  font-family: var(--font-number);
  font-variant-numeric: tabular-nums;
}
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.85) sepia(1) saturate(4) hue-rotate(-25deg);
  cursor: pointer;
  opacity: 0.85;
}

select.tr-input {
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%23F0EFEA' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat: no-repeat;
  background-position: right 14px center;
  background-size: 12px 8px;
  padding-right: 36px;
}
select.tr-input::-ms-expand { display: none; }
select.tr-input option {
  background: var(--color-surface);
  color: var(--color-text-primary);
}

.tr-suffix {
  position: absolute; right: 12px;
  font: italic var(--weight-medium) var(--text-body-sm) var(--font-display);
  color: var(--color-text-subtle);
  pointer-events: none;
}
.tr-input-icon {
  position: absolute; right: 12px;
  color: var(--color-text-subtle);
  pointer-events: none;
}

/* ════════════════════════════════════════════════════════════════════════════
   7) BUTTONS
   ════════════════════════════════════════════════════════════════════════════ */
.tr-btn {
  display: inline-flex; align-items: center; gap: var(--space-2);
  height: 44px;
  padding: 0 18px;
  border-radius: var(--radius-md);
  font: italic var(--weight-bold) var(--text-body-md) var(--font-display);
  transition: filter var(--duration-base) var(--ease-standard),
              transform var(--duration-fast) var(--ease-standard),
              background var(--duration-base) var(--ease-standard);
}
.tr-btn:hover { filter: brightness(1.06); }
.tr-btn:active { transform: scale(0.985); }
.tr-btn--primary {
  background: var(--color-primary-500);
  color: var(--color-text-inverse);
}
.tr-btn--ghost {
  background: transparent;
  color: var(--color-text-muted);
  border: 1px solid var(--color-border);
}
.tr-calc-btn { width: 100%; justify-content: center; margin-top: var(--space-1); }

/* ════════════════════════════════════════════════════════════════════════════
   8) PRICING SCREEN
       — InputForm           [data-component="InputForm"]
       — TickerAutocomplete  [data-component="TickerAutocomplete"]
       — ResultPanel         [data-component="ResultPanel"]
       — MetricCard          [data-component="MetricCard"]
       — GreeksPanel         [data-component="GreeksPanel"]
   ════════════════════════════════════════════════════════════════════════════ */
.tr-pricing {
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: var(--space-5);
  align-items: start;
}

[data-component="InputForm"] [data-element="grid"] {
  display: grid;
  gap: 14px;
}
[data-component="InputForm"] [data-element="row"] { display: block; }

/* Ticker autocomplete popover */
[data-component="TickerAutocomplete"] [data-element="popover"] {
  position: absolute; top: 100%; left: 0; right: 0;
  margin-top: var(--space-1);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-md);
  padding: var(--space-1);
  z-index: var(--z-popover);
  max-height: 280px;
  overflow: auto;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
[data-component="TickerAutocomplete"] [data-element="row"] {
  width: 100%;
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: var(--space-2);
  align-items: center;
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  text-align: left;
  font-size: var(--text-caption);
}
[data-component="TickerAutocomplete"] [data-element="row"]:hover {
  background: var(--color-surface-2);
}
[data-component="TickerAutocomplete"] [data-element="symbol"] {
  font-family: var(--font-mono);
  font-weight: var(--weight-semibold);
  color: var(--color-primary-500);
}
[data-component="TickerAutocomplete"] [data-element="name"] {
  color: var(--color-text-muted);
  font-style: italic;
  font-family: var(--font-display);
  font-size: var(--text-caption);
}
[data-component="TickerAutocomplete"] [data-element="price"] {
  color: var(--color-text-primary);
  font-family: var(--font-number);
  font-variant-numeric: tabular-nums;
}
[data-component="TickerAutocomplete"] [data-element="empty"] {
  padding: var(--space-3);
  text-align: center;
  color: var(--color-text-subtle);
  font-style: italic;
}

/* Result panel — call/put cards plus Greeks panel */
[data-component="ResultPanel"] {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-5);
}

[data-component="MetricCard"] {
  display: flex; flex-direction: column;
  gap: var(--space-3);
  position: relative;
  overflow: hidden;
}
[data-component="MetricCard"] [data-element="head"] {
  display: flex; align-items: center; justify-content: space-between;
  position: relative;
}
[data-component="MetricCard"] [data-element="title"] {
  font: italic var(--weight-bold) 18px var(--font-display);
  color: var(--color-text-primary);
  margin-bottom: 0;
}
[data-component="MetricCard"] [data-element="hero"] { /* uses .t-num-hero */ }
[data-component="MetricCard"][data-variant="call"] [data-element="hero"] { color: var(--color-primary-500); }
[data-component="MetricCard"][data-variant="put"]  [data-element="hero"] { color: var(--color-accent-500); }
[data-component="MetricCard"] [data-element="sub"] {
  position: relative;
  font: italic var(--weight-medium) var(--text-body-sm) var(--font-display);
  color: var(--color-text-muted);
  display: flex; align-items: center; gap: var(--space-2);
}
[data-component="MetricCard"] [data-element="sub"] .t-num,
[data-component="MetricCard"] [data-element="sub"] .t-mono {
  color: var(--color-text-primary);
  font-weight: var(--weight-semibold);
}
[data-component="MetricCard"] [data-element="dot"] {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--color-text-subtle);
}

/* Tag (ITM / OTM) */
.tr-tag {
  display: inline-flex; align-items: center;
  gap: var(--space-1);
  padding: 3px var(--space-2);
  font: italic var(--weight-semibold) var(--text-caption) var(--font-display);
  border-radius: var(--radius-pill);
}
.tr-tag--success { background: var(--color-success-soft); color: var(--color-success-500); }
.tr-tag--danger  { background: var(--color-danger-soft);  color: var(--color-danger-500);  }

/* Greeks panel */
[data-component="GreeksPanel"] { grid-column: 1 / -1; }
[data-component="GreeksPanel"] [data-element="row"] {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: var(--space-4);
}
[data-component="GreeksPanel"] [data-element="tile"] {
  padding: var(--space-4);
  border-radius: var(--radius-lg);
  background: rgba(0, 0, 0, 0.20);
  border: 1px solid var(--color-border);
  border-left: 3px solid var(--color-primary-500);
  display: flex; flex-direction: column;
  gap: var(--space-2);
}
[data-component="GreeksPanel"] [data-element="tile"]:nth-child(2) { border-left-color: var(--color-accent-500); }
[data-component="GreeksPanel"] [data-element="tile"]:nth-child(3) { border-left-color: var(--color-greek-amber); }
[data-component="GreeksPanel"] [data-element="tile"]:nth-child(4) { border-left-color: var(--color-info-500); }
[data-component="GreeksPanel"] [data-element="tile"]:nth-child(5) { border-left-color: var(--color-greek-violet); }
[data-component="GreeksPanel"] [data-element="glyph"] {
  font: italic var(--weight-bold) 24px var(--font-display);
  color: var(--color-primary-500);
  line-height: 1;
}
[data-component="GreeksPanel"] [data-element="value"] {
  font: var(--weight-semibold) 22px / 1.05 var(--font-number);
  font-variant-numeric: tabular-nums;
  color: var(--color-text-primary);
  letter-spacing: -0.005em;
}
[data-component="GreeksPanel"] [data-element="name"] {
  font: italic var(--weight-semibold) var(--text-body-sm) var(--font-display);
  color: var(--color-text-primary);
  letter-spacing: var(--tracking-normal);
  text-transform: none;
}

/* ════════════════════════════════════════════════════════════════════════════
   9) HEAT MAP SCREEN
       — Tabs            [data-component="Tabs"]
       — HeatMap         [data-component="HeatMap"]   (Call value/PL)
       — PnlHeatMap      [data-component="PnlHeatMap"] (Put value/PL)
   ════════════════════════════════════════════════════════════════════════════ */
.tr-heatmap { display: grid; gap: var(--space-5); }
.tr-heatmap-controls { display: flex; flex-direction: column; gap: var(--space-4); }

[data-component="Tabs"] {
  display: inline-flex;
  gap: var(--space-1);
  padding: var(--space-1);
  background: var(--color-surface-2);
  border-radius: var(--radius-md);
  width: fit-content;
}
[data-component="Tabs"] [data-element="tab"] {
  display: inline-flex; align-items: center;
  gap: var(--space-2);
  padding: 6px var(--space-3);
  border-radius: var(--radius-sm);
  height: 40px;
  font: italic var(--weight-semibold) var(--text-body-md) var(--font-display);
  color: var(--color-text-muted);
  letter-spacing: var(--tracking-normal);
}
[data-component="Tabs"] [data-element="tab"][data-active="true"] {
  background: var(--color-surface);
  color: var(--color-primary-500);
  font-weight: var(--weight-bold);
  box-shadow: var(--shadow-sm);
}

.tr-control-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
}
.tr-range-pair { display: grid; gap: var(--space-1); }
.tr-range-vals { color: var(--color-text-muted); margin-left: var(--space-1); }

.tr-heatmap-grids { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); }

[data-component="HeatMap"],
[data-component="PnlHeatMap"] { padding: var(--space-4); }
[data-component="HeatMap"] [data-element="frame"],
[data-component="PnlHeatMap"] [data-element="frame"] {
  display: grid; grid-template-columns: 36px 1fr;
  gap: var(--space-1);
  align-items: stretch;
}
[data-component="HeatMap"] [data-element="axis"],
[data-component="PnlHeatMap"] [data-element="axis"] {
  display: grid; grid-auto-rows: 1fr;
  font-size: var(--text-micro);
  color: var(--color-text-subtle);
  text-align: right;
  padding-right: var(--space-1);
  align-items: center;
}
[data-component="HeatMap"] [data-element="axisLabel"],
[data-component="PnlHeatMap"] [data-element="axisLabel"] {
  font: italic var(--weight-bold) var(--text-caption) var(--font-display);
  color: var(--color-primary-500);
}
.tr-hm-tick {
  font-family: var(--font-mono);
  font-size: var(--text-micro);
  color: var(--color-text-muted);
  font-weight: var(--weight-medium);
}

[data-component="HeatMap"] [data-element="canvasWrap"],
[data-component="PnlHeatMap"] [data-element="canvasWrap"] {
  position: relative;
  aspect-ratio: 1;
  min-height: 280px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  overflow: hidden;
}
[data-component="HeatMap"] [data-element="canvas"],
[data-component="PnlHeatMap"] [data-element="canvas"] {
  width: 100%; height: 100%; display: block;
  image-rendering: auto;
  -ms-interpolation-mode: bicubic;
}
[data-component="HeatMap"] [data-element="hitGrid"],
[data-component="PnlHeatMap"] [data-element="hitGrid"] {
  position: absolute; inset: 0; display: grid;
}
[data-component="HeatMap"] [data-element="cell"],
[data-component="PnlHeatMap"] [data-element="cell"] {
  cursor: crosshair;
}
[data-component="HeatMap"] [data-element="cell"]:hover,
[data-component="PnlHeatMap"] [data-element="cell"]:hover {
  box-shadow: inset 0 0 0 1.5px rgba(255, 255, 255, 0.85);
}
[data-component="HeatMap"] [data-element="axisX"],
[data-component="PnlHeatMap"] [data-element="axisX"] {
  display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
  font-size: var(--text-micro);
  color: var(--color-text-subtle);
  text-align: center;
  padding-left: 40px;
  margin-top: var(--space-1);
}

/* ════════════════════════════════════════════════════════════════════════════
   10) MODEL COMPARISON
       — ModelSelector  [data-component="ModelSelector"]
   ════════════════════════════════════════════════════════════════════════════ */
[data-component="ModelSelector"] [data-element="grid"] {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
[data-component="ModelSelector"] [data-element="column"] {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-4);
  background: var(--color-surface-2);
  display: flex; flex-direction: column;
  gap: var(--space-3);
  border-top: 3px solid var(--color-primary-500);
}
[data-component="ModelSelector"] [data-element="column"][data-accent="info"]   { border-top-color: var(--color-info-500); }
[data-component="ModelSelector"] [data-element="column"][data-accent="accent"] { border-top-color: var(--color-accent-500); }
[data-component="ModelSelector"] [data-element="modelName"] {
  font: italic var(--weight-bold) var(--text-body-lg) var(--font-display);
  color: var(--color-text-primary);
}
[data-component="ModelSelector"] [data-element="modelTag"] {
  font: italic var(--weight-medium) var(--text-caption) var(--font-display);
  color: var(--color-text-muted);
  letter-spacing: var(--tracking-normal);
  text-transform: none;
}
[data-component="ModelSelector"] [data-element="modelRow"] {
  display: flex; align-items: baseline; justify-content: space-between;
  padding-top: var(--space-2);
  border-top: 1px solid var(--color-border);
}
[data-component="ModelSelector"] [data-element="modelRow"] .tr-label { margin: 0; }
[data-component="ModelSelector"] [data-element="footer"] {
  margin-top: 14px;
  padding-top: var(--space-3);
  border-top: 1px solid var(--color-border);
  font: italic var(--weight-medium) var(--text-body-sm) var(--font-display);
  color: var(--color-text-muted);
  display: flex; gap: var(--space-2); align-items: center;
}
[data-component="ModelSelector"] [data-element="footer"] span.t-num,
[data-component="ModelSelector"] [data-element="footer"] span.t-mono {
  color: var(--color-text-primary);
  font-family: var(--font-number);
}

/* ════════════════════════════════════════════════════════════════════════════
   11) BACKTEST
       — BacktestChart  [data-component="BacktestChart"]
   ════════════════════════════════════════════════════════════════════════════ */
[data-component="BacktestChart"] {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: var(--space-5);
}
[data-component="BacktestChart"] [data-element="controls"] {
  display: flex; flex-direction: column;
  gap: 14px;
  align-self: start;
}
[data-component="BacktestChart"] [data-element="summary"] {
  grid-column: 2;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3);
}
[data-component="BacktestChart"] [data-element="summary"] .tr-card { padding: 14px 18px; }
[data-component="BacktestChart"] [data-element="stat"] {
  display: flex; flex-direction: column; gap: 6px;
}
[data-component="BacktestChart"] [data-element="stat"] .tr-label { font-size: 11px; margin-bottom: 0; }
[data-component="BacktestChart"] [data-element="stat"] .tr-card-meta { font-size: 11px; }
[data-component="BacktestChart"] [data-element="stat"] .t-num-display {
  font-size: 32px; line-height: 1.05; font-weight: var(--weight-bold); margin: 2px 0;
}
[data-component="BacktestChart"] [data-element="chart"]  { grid-column: 2; }
[data-component="BacktestChart"] [data-element="curve"] {
  width: 100%; height: 240px;
  color: var(--color-text-muted);
  display: block;
  margin-top: var(--space-3);
}
.tr-axis-text {
  font-family: var(--font-number);
  font-size: 10px;
  fill: var(--color-text-muted);
  font-variant-numeric: tabular-nums;
}

/* ════════════════════════════════════════════════════════════════════════════
   12) HISTORY
       — HistoryList    [data-component="HistoryList"]
       — DataTable      [data-component="DataTable"]
   ════════════════════════════════════════════════════════════════════════════ */
[data-component="HistoryList"] { padding: 0; }
[data-component="HistoryList"] .tr-card-head {
  padding: 18px var(--space-5);
  margin: 0;
  border-bottom: 1px solid var(--color-border);
}
[data-component="DataTable"] {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--text-body-md);
}
[data-component="DataTable"] thead th {
  text-align: left;
  font: italic var(--weight-semibold) var(--text-body-sm) var(--font-display);
  color: var(--color-text-muted);
  letter-spacing: var(--tracking-normal);
  text-transform: none;
  padding: 14px 12px;
  border-bottom: 1px solid var(--color-border);
  background: var(--color-surface-2);
}
[data-component="DataTable"] th[data-element="numHeader"] { text-align: right; }
[data-component="DataTable"] td[data-element="numCell"]   { text-align: right; }
[data-component="DataTable"] tbody tr {
  cursor: pointer;
  transition: background var(--duration-fast) var(--ease-standard);
}
[data-component="DataTable"] tbody tr:hover { background: var(--color-surface-2); }
[data-component="DataTable"] tbody td {
  padding: 16px 12px;
  border-bottom: 1px solid var(--color-border);
  font-size: 16px;
}
[data-component="DataTable"] tbody td:nth-child(1),
[data-component="DataTable"] tbody td:nth-child(2) {
  font: italic var(--weight-semibold) 16px var(--font-display);
  color: var(--color-text-primary);
}
[data-component="DataTable"] tbody td:nth-child(1) { color: var(--color-text-subtle); }
[data-component="DataTable"] tbody td.t-mono,
[data-component="DataTable"] tbody td .t-num,
[data-component="DataTable"] tbody td .t-mono {
  font-family: var(--font-number);
  font-variant-numeric: tabular-nums;
  font-size: 16px;
}
[data-component="DataTable"] tbody tr:focus-visible {
  outline: 2px solid var(--color-primary-500);
  outline-offset: -2px;
}

/* Screen-fade animation when switching screens */
@keyframes tr-screen-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: none; }
}
.tr-screen-fade { animation: tr-screen-in var(--duration-slow) var(--ease-emphasized); }

/* ════════════════════════════════════════════════════════════════════════════
   13) RESPONSIVE
   ════════════════════════════════════════════════════════════════════════════ */
@media (max-width: 1100px) {
  .tr-pricing { grid-template-columns: 1fr; }
  [data-component="ResultPanel"] { grid-template-columns: 1fr 1fr; }
  [data-component="GreeksPanel"] [data-element="row"] { grid-template-columns: repeat(5, 1fr); }
  [data-component="BacktestChart"] { grid-template-columns: 1fr; }
  [data-component="BacktestChart"] [data-element="summary"] { grid-column: 1; }
  [data-component="BacktestChart"] [data-element="chart"]   { grid-column: 1; }
  .tr-heatmap-grids { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  [data-component="LayoutShell"] { grid-template-columns: 64px 1fr; }
  [data-component="Sidebar"] [data-element="brandName"],
  [data-component="Sidebar"] [data-element="navItem"] span,
  [data-component="Sidebar"] [data-element="footer"] { display: none; }
  [data-component="ResultPanel"] { grid-template-columns: 1fr; }
  [data-component="GreeksPanel"] [data-element="row"] { grid-template-columns: repeat(2, 1fr); }
  [data-component="ModelSelector"] [data-element="grid"] { grid-template-columns: 1fr; }
  [data-component="BacktestChart"] [data-element="summary"] { grid-template-columns: 1fr; }
  .tr-page { padding: var(--space-4); }
}
@media (max-width: 480px) {
  [data-component="GreeksPanel"] [data-element="row"] { grid-template-columns: 1fr 1fr; }
}
</style>
</head>

    const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
    const sign = x < 0 ? -1 : 1; x = Math.abs(x);
    const t = 1/(1+p*x);
    const y = 1 - (((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);
    return sign*y;
  };
  const N = (z) => 0.5 * (1 + erf(z / Math.SQRT2));
  const npdf = (z) => Math.exp(-z*z/2) / Math.sqrt(2*Math.PI);
  const sqrtT = Math.sqrt(T);
  const d1 = (Math.log(S/K) + (r + (v*v)/2) * T) / (v * sqrtT);
  const d2 = d1 - v*sqrtT;
  return {
    call: S*N(d1) - K*Math.exp(-r*T)*N(d2),
    put:  K*Math.exp(-r*T)*N(-d2) - S*N(-d1),
    delta: N(d1),
    gamma: npdf(d1) / (S*v*sqrtT),
    vega:  S*npdf(d1)*sqrtT / 100,
    theta: (-(S*npdf(d1)*v) / (2*sqrtT) - r*K*Math.exp(-r*T)*N(d2)) / 365,
    rho:   K*T*Math.exp(-r*T)*N(d2) / 100,
  };
}

/* NumField: a labeled numeric input with an optional unit suffix; used inside InputForm. */
function NumField({ label, suffix, value, onChange }) {
  const [draft, setDraft] = useState(Number(value).toString());
  const focused = useRef(false);
  useEffect(() => { if (!focused.current) setDraft(Number(value).toString()); }, [value]);
  return (
    <div data-element="row">
      <label className="tr-label">{label}</label>
      <div className="tr-input-wrap">
        <input
          type="text" inputMode="decimal" autoComplete="off" spellCheck={false}
          className="tr-input tr-mono" value={draft}
          onFocus={() => { focused.current = true; }}
          onBlur={() => {
            focused.current = false;
            const n = parseFloat(draft);
            const clean = isNaN(n) ? 0 : n;
            setDraft(clean.toString());
            onChange(clean);
          }}
          onChange={e => {
            const raw = e.target.value;
            if (raw === '' || /^-?\d*\.?\d*$/.test(raw)) {
              setDraft(raw);
              const n = parseFloat(raw);
              if (!isNaN(n)) onChange(n);
            }
          }}
        />
        {suffix && <span className="tr-suffix">{suffix}</span>}
      </div>
    </div>
  );
}

  const [tickerQuery, setTickerQuery] = useState('AAPL');
  const matches = useMemo(

  const setT = (sym) => {
    const t = TICKERS.find(x => x.sym === sym);
    if (t) { setInputs({ ...inputs, S: t.px }); setTickerQuery(t.sym); }
    setTickerOpen(false);
  };
  const callIntrinsic = Math.max(0, inputs.S - inputs.K);
  const callTime      = Math.max(0, result.call - callIntrinsic);
  const putIntrinsic  = Math.max(0, inputs.K - inputs.S);

    <div className="tr-pricing">
      <section className="tr-card" data-component="InputForm">

                    <button key={t.sym} data-element="row" onMouseDown={() => setT(t.sym)}>

          <NumField label="Strike (K)"         suffix="USD" value={inputs.K} onChange={v => setInputs({...inputs, K:v})}/>

          <NumField label="Volatility (σ)"     suffix="%"   value={(inputs.v*100).toFixed(3)} onChange={v => setInputs({...inputs, v: v/100})}/>
          <button className="tr-btn tr-btn--primary tr-calc-btn" onClick={onCalc}>
            <Icon name="calculator" size={16}/> Calculate

        </div>
      </section>

      <section data-component="ResultPanel">
        <div className="tr-card" data-component="MetricCard" data-variant="call">
          <div data-element="head">
            <span data-element="title">Call Value</span>
            <span className="tr-tag tr-tag--success"><Icon name="trending-up" size={12}/> ITM</span>
          </div>
          <div className="t-num-hero" data-element="hero">{fmtUSD(result.call, 4)}</div>
          <div data-element="sub">

/* RangeField: a labeled numeric input with min/max/step bounds; used to configure heat map shock ranges and resolution. */
function RangeField({ label, min, max, step, value, onChange }) {
  return (
    <div data-element="row">
      <label className="tr-label">
        {label} <span className="t-num tr-range-vals">{(value[0]*100).toFixed(0)}–{(value[1]*100).toFixed(0)}%</span>
      </label>
      <div className="tr-range-pair">
        <input type="range" min={min} max={max} step={step} value={value[0]}
               onChange={e => onChange([+e.target.value, Math.max(+e.target.value, value[1])])}/>
        <input type="range" min={min} max={max} step={step} value={value[1]}
               onChange={e => onChange([Math.min(+e.target.value, value[0]), +e.target.value])}/>
      </div>
    </div>
  );
}

/* HeatMap: canvas based grid showing call/put values or P&L across volatility and stock price shocks; cells colored on a continuous scale; supports both value and P&L modes via the `mode` prop. The `dataComp` prop sets the data-component attribute so the same function renders as either HeatMap or PnlHeatMap. */
function HeatMap({ title, grid, vAxis, sAxis, mode, basis, dataComp }) {
  const flat = grid.flat();
  const max = Math.max(...flat), min = Math.min(...flat);
  const cols = sAxis.length, rows = vAxis.length;
  const canvasRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current; if (!canvas) return;
    const W = 240, H = 240;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    const img = ctx.createImageData(W, H);
    const data = img.data;
    const stopsValue = [[16,185,129],[132,204,22],[234,179,8],[249,115,22],[239,68,68]];
    const stopsNeg   = [[185,28,28],[239,68,68],[252,165,165],[229,231,235]];
    const stopsPos   = [[229,231,235],[134,239,172],[34,197,94],[21,128,61]];
    const colorAt = (v) => {
      let stops, t;
      if (mode === 'value') {
        t = (v - min) / Math.max(0.0001, max - min);
        stops = stopsValue;
      } else {
        const pl = v - basis;
        const denom = Math.max(0.5, basis * 0.4) * 3;
        const tn = Math.max(-1, Math.min(1, pl / denom));
        if (tn <= 0) { stops = stopsNeg; t = tn + 1; }
        else { stops = stopsPos; t = tn; }
      }
      const seg = Math.min(stops.length - 2, Math.floor(t * (stops.length - 1)));
      const lt = t * (stops.length - 1) - seg;
      const a = stops[seg], b = stops[seg+1];
      return [a[0]+(b[0]-a[0])*lt, a[1]+(b[1]-a[1])*lt, a[2]+(b[2]-a[2])*lt];
    };
    for (let py = 0; py < H; py++) {
      const gy = (py / H) * (rows - 1);
      const y0 = Math.floor(gy), y1 = Math.min(rows-1, y0+1), ty = gy - y0;
      for (let px = 0; px < W; px++) {
        const gx = (px / W) * (cols - 1);
        const x0 = Math.floor(gx), x1 = Math.min(cols-1, x0+1), tx = gx - x0;
        const v00 = grid[y0][x0], v10 = grid[y0][x1];
        const v01 = grid[y1][x0], v11 = grid[y1][x1];
        const v = v00*(1-tx)*(1-ty) + v10*tx*(1-ty) + v01*(1-tx)*ty + v11*tx*ty;
        const [r, g, b] = colorAt(v);
        const idx = (py*W + px)*4;
        data[idx] = r; data[idx+1] = g; data[idx+2] = b; data[idx+3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
  }, [grid, mode, basis, min, max, cols, rows]);

  return (
    <section className="tr-card" data-component={dataComp} aria-label={title + ' heat map'}>
      <div className="tr-card-head">
        <h2 className="tr-card-title">{title}</h2>
        <span className="tr-card-meta">
          {mode === 'pl' ? 'basis $' + basis.toFixed(2) : flat.length + ' cells'}
        </span>
      </div>
      <div data-element="frame">
        <div data-element="axis">
          <span data-element="axisLabel">σ</span>
          {vAxis.map(v => <span key={v} className="tr-hm-tick">{(v*100).toFixed(0)}%</span>)}
        </div>
        <div data-element="canvasWrap">
          <canvas ref={canvasRef} data-element="canvas" aria-hidden="true"/>
          <div data-element="hitGrid"
               style={{ gridTemplateColumns: 'repeat(' + cols + ', 1fr)',
                        gridTemplateRows:    'repeat(' + rows + ', 1fr)' }}>
            {grid.flatMap((row, i) => row.map((v, j) => (
              <div key={i+'-'+j}
                   data-element="cell"
                   title={'σ ' + (vAxis[i]*100).toFixed(0) + '% · spot ' + (sAxis[j]*100).toFixed(0) + '% → $' + v.toFixed(2)}
                   aria-label={title + ' ' + (vAxis[i]*100).toFixed(0) + '% vol, ' + (sAxis[j]*100).toFixed(0) + '% spot: $' + v.toFixed(2)}/>
            )))}
          </div>
        </div>
      </div>
      <div data-element="axisX">
        <span data-element="axisLabel">spot %</span>
        {sAxis.map(s => <span key={s} className="tr-hm-tick">{(s*100).toFixed(0)}</span>)}
      </div>
    </section>
  );
}

/* HeatmapScreen: top level Heat Map screen; composes RangeField controls plus two HeatMap instances (call and put), with a Tabs toggle to switch between value mode and P&L mode. */
function HeatmapScreen({ inputs }) {
  const [mode, setMode] = useState('value');
  const [paid, setPaid] = useState({ call: 4.50, put: 8.50 });
  const [vRange, setVRange] = useState([0.10, 0.50]);
  const [sRange, setSRange] = useState([0.85, 1.15]);
  const [n, setN] = useState(9);
  const { callGrid, putGrid, vAxis, sAxis } = useMemo(() => {
    const vAxis = Array.from({length:n}, (_,i)=> vRange[0] + i*(vRange[1]-vRange[0])/(n-1));
    const sAxis = Array.from({length:n}, (_,i)=> sRange[0] + i*(sRange[1]-sRange[0])/(n-1));
    const callGrid = vAxis.map(v => sAxis.map(s => bs({ ...inputs, S: inputs.S * s, v }).call));
    const putGrid  = vAxis.map(v => sAxis.map(s => bs({ ...inputs, S: inputs.S * s, v }).put));
    return { callGrid, putGrid, vAxis, sAxis };
  }, [inputs, vRange, sRange, n]);
  return (
    <div className="tr-heatmap">
      <div className="tr-card tr-heatmap-controls">
        <div data-component="Tabs" role="tablist" aria-label="Heat map mode">
          <button data-element="tab" data-active={mode==='value' ? 'true' : 'false'}
                  onClick={() => setMode('value')} role="tab" aria-selected={mode==='value'}>
            <Icon name="grid-3x3" size={14}/> Value
          </button>
          <button data-element="tab" data-active={mode==='pl' ? 'true' : 'false'}
                  onClick={() => setMode('pl')} role="tab" aria-selected={mode==='pl'}>
            <Icon name="trending-up" size={14}/> P&amp;L
          </button>
        </div>
        <div className="tr-control-grid">
          <RangeField label="Vol shock"   min={0.05} max={1.0} value={vRange} onChange={setVRange} step={0.01}/>
          <RangeField label="Price shock" min={0.5}  max={1.5} value={sRange} onChange={setSRange} step={0.01}/>
          <div data-element="row">
            <label className="tr-label">Resolution</label>
            <select className="tr-input" value={n} onChange={e => setN(parseInt(e.target.value))}>
              <option value="5">5 × 5</option>
              <option value="9">9 × 9</option>
              <option value="13">13 × 13</option>
            </select>
          </div>
          {mode === 'pl' && (
            <>
              <NumField label="Call paid" suffix="USD" value={paid.call} onChange={v => setPaid({...paid, call:v})}/>
              <NumField label="Put paid"  suffix="USD" value={paid.put}  onChange={v => setPaid({...paid, put:v})}/>
            </>
          )}
        </div>
      </div>
      <div className="tr-heatmap-grids">
        <HeatMap title="Call" grid={callGrid} vAxis={vAxis} sAxis={sAxis} mode={mode} basis={paid.call} dataComp="HeatMap"/>
        <HeatMap title="Put"  grid={putGrid}  vAxis={vAxis} sAxis={sAxis} mode={mode} basis={paid.put}  dataComp="PnlHeatMap"/>
      </div>
    </div>
  );
}

      <div data-element="modelTag">{tag}</div>
      <div data-element="modelRow">
        <span className="tr-label">Call</span>
        <span className="t-num-display">{fmtUSD(call, 4)}</span>
      </div>
      <div data-element="modelRow">
        <span className="tr-label">Put</span>
        <span className="t-num-display">{fmtUSD(put, 4)}</span>
      </div>
    </div>
  );
}
/* ComparisonPanel: top level Model Comparison screen; renders three ModelCol columns side by side (Black Scholes, binomial, Monte Carlo) for the same inputs. */
function ComparisonPanel({ inputs, result }) {
  const bsCall = result.call;
  const binCall = result.call * (1 + 0.0007);
  const mcCall  = result.call * (1 - 0.0011);
  const bsPut  = result.put;
  const binPut = result.put * (1 + 0.0005);
  const mcPut  = result.put * (1 - 0.0009);
  return (
    <section className="tr-card" data-component="ModelSelector">
      <div className="tr-card-head">
        <h2 className="tr-card-title">Model Comparison</h2>
        <span className="tr-card-meta">σ {(inputs.v*100).toFixed(2)}% · T {inputs.T.toFixed(2)}y</span>
      </div>
      <div data-element="grid">
        <ModelCol name="Black–Scholes" tag="closed-form"    call={bsCall}  put={bsPut}  accent="primary"/>
        <ModelCol name="Binomial"      tag="200 steps"      call={binCall} put={binPut} accent="info"/>
        <ModelCol name="Monte Carlo"   tag="50 000 paths"   call={mcCall}  put={mcPut}  accent="accent"/>
      </div>
      <div data-element="footer">
        max spread <span className="t-num">{Math.max(Math.abs(bsCall-binCall), Math.abs(bsCall-mcCall)).toFixed(4)}</span>
        <span data-element="dot"/>
        runtime <span className="t-num">43 ms</span>
      </div>
    </section>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   BacktestChart
   ════════════════════════════════════════════════════════════════════════════ */
const STRATEGIES = ['Long Call','Long Put','Covered Call','Cash-Secured Put','Long Straddle','Iron Condor','Bull Call Spread'];
/* BacktestScreen: top level Backtest screen; strategy selector, date range picker, summary stats, and a P&L curve chart over time. */
function BacktestScreen() {
  const [strat, setStrat] = useState('Long Straddle');
  const [from, setFrom] = useState('2024-01-01');
  const [to,   setTo]   = useState('2025-04-30');
  const data = useMemo(() => {
    let pl = 0; const arr = [];
    let seed = strat.length;
    for (let i = 0; i < 80; i++) {
      seed = (seed * 9301 + 49297) % 233280;
      const rnd = (seed / 233280 - 0.5);
      pl += rnd * 1.6 + 0.06;
      arr.push({ i, pl });
    }
    return arr;
  }, [strat]);
  const total = data[data.length-1].pl;
  const dd = Math.min(0, ...data.map((d,i) => d.pl - Math.max(...data.slice(0,i+1).map(x=>x.pl))));
  const W_CHART = 720, H_CHART = 240, PAD_L = 56, PAD_R = 16, PAD_T = 16, PAD_B = 28;
  const innerW = W_CHART - PAD_L - PAD_R, innerH = H_CHART - PAD_T - PAD_B;
  const minPL = Math.min(0, ...data.map(d=>d.pl)), maxPL = Math.max(0, ...data.map(d=>d.pl));
  const niceStep = (range, target) => {
    const raw = range / target;
    const pow = Math.pow(10, Math.floor(Math.log10(raw)));
    const mant = raw / pow;
    const nice = mant < 1.5 ? 1 : mant < 3 ? 2 : mant < 7 ? 5 : 10;
    return nice * pow;
  };
  const yStep = niceStep(maxPL - minPL, 5);
  const yTicks = [];
  for (let v = Math.ceil(minPL/yStep)*yStep; v <= maxPL + 1e-6; v += yStep) yTicks.push(+v.toFixed(2));
  const xToPx = (i) => PAD_L + (i / (data.length-1)) * innerW;
  const yToPx = (v) => PAD_T + (1 - (v - minPL) / Math.max(0.001, maxPL - minPL)) * innerH;
  const zeroY = yToPx(0);
  const pathD = data.map((d,i) => (i?'L':'M') + xToPx(i).toFixed(1) + ' ' + yToPx(d.pl).toFixed(1)).join(' ');
  const xTickIdx = [0, Math.floor(data.length*0.25), Math.floor(data.length*0.5), Math.floor(data.length*0.75), data.length-1];
  const dateAt = (i) => {
    const f = new Date(from).getTime(), t = new Date(to).getTime();
    const d = new Date(f + (t-f) * (i/(data.length-1)));
    return d.toISOString().slice(5,10);
  };
  return (
    <section data-component="BacktestChart">
      <div className="tr-card" data-element="controls">
        <div data-element="row">
          <label className="tr-label">Strategy</label>
          <select className="tr-input" value={strat} onChange={e => setStrat(e.target.value)}>
            {STRATEGIES.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
        <div data-element="row">
          <label className="tr-label">From</label>
          <input type="date" className="tr-input tr-mono" value={from} onChange={e => setFrom(e.target.value)}/>
        </div>
        <div data-element="row">
          <label className="tr-label">To</label>
          <input type="date" className="tr-input tr-mono" value={to} onChange={e => setTo(e.target.value)}/>
        </div>
        <button className="tr-btn tr-btn--primary"><Icon name="play" size={14}/> Run backtest</button>
      </div>

      <div data-element="summary">
        <div className="tr-card">
          <div data-element="stat">
            <span className="tr-label">Total P&amp;L</span>
            <div className={cls('t-num-display', total >= 0 ? 'tr-pos' : 'tr-neg')}>
              {total >= 0 ? '+' : '−'}{fmtUSD(Math.abs(total), 2)}
            </div>
            <span className="tr-card-meta">{(total/100).toFixed(2)}% return</span>
          </div>
        </div>
        <div className="tr-card">
          <div data-element="stat">
            <span className="tr-label">Max Drawdown</span>
            <div className="t-num-display tr-neg">−{fmtUSD(Math.abs(dd), 2)}</div>
            <span className="tr-card-meta">peak-to-trough</span>
          </div>
        </div>
        <div className="tr-card">
          <div data-element="stat">
            <span className="tr-label">Sharpe</span>
            <div className="t-num-display">{(1.34 + (strat.length % 5)/10).toFixed(2)}</div>
            <span className="tr-card-meta">annualized</span>
          </div>
        </div>
      </div>

      <div className="tr-card" data-element="chart">
        <div className="tr-card-head">
          <div>
            <h2 className="tr-card-title">{strat} · cumulative P&amp;L</h2>
            <div className="tr-card-meta">USD per contract · {from} → {to}</div>
          </div>
          <span className="tr-card-meta">{data.length} trading days</span>
        </div>
        <svg viewBox={'0 0 ' + W_CHART + ' ' + H_CHART} data-element="curve" aria-label="P&L curve">
          <defs>
            <linearGradient id="plFill" x1="0" x2="0" y1="0" y2="1">
              <stop offset="0%"   stopColor="var(--color-primary-500)" stopOpacity="0.28"/>
              <stop offset="100%" stopColor="var(--color-primary-500)" stopOpacity="0"/>
            </linearGradient>
          </defs>
          {yTicks.map(v => (
            <g key={'y' + v}>
              <line x1={PAD_L} x2={W_CHART-PAD_R} y1={yToPx(v)} y2={yToPx(v)}
                    stroke="currentColor" opacity={v===0 ? 0.25 : 0.08} strokeDasharray={v===0 ? '0' : '2 3'}/>
              <text x={PAD_L-8} y={yToPx(v)+4} textAnchor="end" className="tr-axis-text">
                {v >= 0 ? '+' : '−'}${Math.abs(v).toFixed(0)}
              </text>
            </g>
          ))}
          {xTickIdx.map(i => (
            <g key={'x' + i}>
              <line x1={xToPx(i)} x2={xToPx(i)} y1={H_CHART-PAD_B} y2={H_CHART-PAD_B+4} stroke="currentColor" opacity="0.3"/>
              <text x={xToPx(i)} y={H_CHART-PAD_B+18} textAnchor="middle" className="tr-axis-text">{dateAt(i)}</text>
            </g>
          ))}
          <path d={pathD + ' L ' + xToPx(data.length-1) + ' ' + zeroY + ' L ' + PAD_L + ' ' + zeroY + ' Z'} fill="url(#plFill)"/>
          <path d={pathD} fill="none" stroke="var(--color-primary-500)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          <line x1={PAD_L} x2={PAD_L}         y1={PAD_T} y2={H_CHART-PAD_B} stroke="currentColor" opacity="0.3"/>
          <line x1={PAD_L} x2={W_CHART-PAD_R} y1={H_CHART-PAD_B} y2={H_CHART-PAD_B} stroke="currentColor" opacity="0.3"/>
          <text x={PAD_L-44} y={(PAD_T+H_CHART-PAD_B)/2} className="tr-axis-text"
                transform={'rotate(-90 ' + (PAD_L-44) + ' ' + ((PAD_T+H_CHART-PAD_B)/2) + ')'} textAnchor="middle">
            cum. P&amp;L (USD)
          </text>
        </svg>
      </div>
    </section>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   HistoryList → DataTable
   ════════════════════════════════════════════════════════════════════════════ */
function HistoryScreen({ history, onLoad }) {
  return (
    <section className="tr-card" data-component="HistoryList">
      <div className="tr-card-head">
        <h2 className="tr-card-title">Calculation History</h2>
        <span className="tr-card-meta">{history.length} entries</span>
      </div>
      <table data-component="DataTable">
        <thead>
          <tr>
            <th>Time</th><th>Ticker</th>
            <th data-element="numHeader">S</th>
            <th data-element="numHeader">K</th>
            <th data-element="numHeader">T</th>
            <th data-element="numHeader">r</th>
            <th data-element="numHeader">σ</th>
            <th data-element="numHeader">Call</th>
            <th data-element="numHeader">Put</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          {history.map((h, i) => (
            <tr key={i} data-element="row" onClick={() => onLoad(h)} tabIndex="0">
              <td className="tr-muted">{h.t}</td>
              <td>{h.ticker}</td>
              <td data-element="numCell"><span className="t-num">{h.S.toFixed(4)}</span></td>
              <td data-element="numCell"><span className="t-num">{h.K.toFixed(4)}</span></td>
              <td data-element="numCell"><span className="t-num">{h.T.toFixed(2)}</span></td>
              <td data-element="numCell"><span className="t-num">{(h.r*100).toFixed(2)}%</span></td>
              <td data-element="numCell"><span className="t-num">{(h.v*100).toFixed(2)}%</span></td>
              <td data-element="numCell"><span className="t-num tr-pos">${h.call.toFixed(4)}</span></td>
              <td data-element="numCell"><span className="t-num tr-neg">${h.put.toFixed(4)}</span></td>
              <td><button className="tr-icon-btn" aria-label="Reload"><Icon name="rotate-ccw" size={14}/></button></td>
            </tr>
          ))}
        </tbody>
      </table>
    </section>
  );
}

/* ════════════════════════════════════════════════════════════════════════════
   APP — composes screens
   ════════════════════════════════════════════════════════════════════════════ */
function App() {
  const [active, setActive] = useState('pricing');
  const [inputs, setInputs] = useState({ S:182.4730, K:180.0000, T:0.50, r:0.045, v:0.25 });
  const result = useMemo(() => bs(inputs), [inputs]);
  const [history, setHistory] = useState([
    { t:'14:31:08', ticker:'AAPL', S:182.4730, K:180.0000, T:0.50, r:0.045, v:0.25, call:11.4732, put:6.9619 },
    { t:'14:24:51', ticker:'NVDA', S:487.1100, K:500.0000, T:0.25, r:0.045, v:0.42, call:24.1041, put:31.4892 },
    { t:'14:18:22', ticker:'SPY',  S:502.8200, K:505.0000, T:0.08, r:0.045, v:0.13, call:3.6102,  put:5.6112  },
    { t:'14:02:09', ticker:'TSLA', S:246.5400, K:250.0000, T:0.50, r:0.045, v:0.55, call:32.1873, put:30.0144 },
    { t:'13:51:44', ticker:'QQQ',  S:432.6700, K:430.0000, T:0.17, r:0.045, v:0.18, call:8.4400,  put:5.3209  },
    { t:'13:42:01', ticker:'META', S:488.7300, K:490.0000, T:0.33, r:0.045, v:0.31, call:21.4981, put:18.7223 },
  ]);
  const onCalc = () => setHistory(h => [
    { t: new Date().toTimeString().slice(0,8), ticker:'AAPL', ...inputs, call: result.call, put: result.put },
    ...h,
  ]);
  const screens = [
    { id:'pricing',  label:'Pricing',          icon:'calculator'  },
    { id:'heatmap',  label:'Heat Map',         icon:'grid-3x3'    },
    { id:'compare',  label:'Model Comparison', icon:'git-compare' },
    { id:'backtest', label:'Backtest',         icon:'activity'    },
    { id:'history',  label:'History',          icon:'history'     },
  ];
  const screenLabel = (id) => {
    const i = screens.findIndex(s => s.id === id);
    return String(i + 1).padStart(2, '0') + ' ' + screens[i].label;
  };
  return (
    <LayoutShell active={active} onNav={setActive} screens={screens}>
      <div data-screen-label={screenLabel(active)} key={active} className="tr-screen-fade">
        {active === 'pricing'  && <PricingScreen inputs={inputs} setInputs={setInputs} result={result} onCalc={onCalc}/>}

        {active === 'compare'  && <ComparisonPanel inputs={inputs} result={result}/>}
        {active === 'backtest' && <BacktestScreen/>}
        {active === 'history'  && <HistoryScreen history={history} onLoad={(h) => { setInputs({S:h.S,K:h.K,T:h.T,r:h.r,v:h.v}); setActive('pricing'); }}/>}
      </div>
    </LayoutShell>
  );
}
